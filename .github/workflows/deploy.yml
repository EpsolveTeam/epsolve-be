name: Epsolve Artifact Deployment

on:
  push:
    branches: [ main, dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment artifact from tracked files
        run: |
          # Create tar.gz from all git-tracked files (excludes untracked like venv)
          git ls-files -z | tar -czf deploy_package.tar.gz --null -T -

      - name: Transfer artifact to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy_package.tar.gz"
          target: "/tmp"
          port: 22
          timeout: 300s
          debug: true

      - name: Execute remote deployment script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 1800s
          script: |
            if [ "${{ github.ref_name }}" == "main" ]; then
              APP_DIR="/home/ubuntu/epsolve/prod"
              PORT=8001
              NAME="epsolve-prod"
            else
              APP_DIR="/home/ubuntu/epsolve/dev"
              PORT=8000
              NAME="epsolve-dev"
            fi

            mkdir -p $APP_DIR
            
            # Clean deployment directory excluding the virtual environment
            find $APP_DIR -mindepth 1 -maxdepth 1 ! -name 'venv' -exec rm -rf {} +
            
            tar -xzf /tmp/deploy_package.tar.gz -C $APP_DIR
            rm /tmp/deploy_package.tar.gz

            cd $APP_DIR

            # Generate environment variables
            cat <<EOF > .env.${{ github.ref_name }}
            PROJECT_NAME="Epsolve"
            SECRET_KEY="${{ secrets.SECRET_KEY }}"
            ENV_STATE=${{ github.ref_name }}
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}"
            BREVO_API_KEY="${{ secrets.BREVO_API_KEY }}"
            BREVO_SENDER_EMAIL="${{ secrets.BREVO_SENDER_EMAIL }}"
            ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}"
            HF_HOME="/tmp/hf_cache"
            HF_HUB_CACHE="/tmp/hf_cache/hub"
            EOF
            
            # Initialize virtual environment if not present
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            ./venv/bin/pip install --upgrade pip

            # Install NumPy 1.x first (sentence-transformers requires NumPy <2)
            ./venv/bin/pip install "numpy<2" --no-cache-dir

            # Install PyTorch CPU-only (compatible with NumPy 1.x)
            ./venv/bin/pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu --no-cache-dir

            # Install sentence-transformers explicitly
            ./venv/bin/pip install sentence-transformers==2.7.0 --no-cache-dir

            # Install remaining dependencies
            ./venv/bin/pip install -r requirements.txt --no-cache-dir

            # Verify critical packages
            ./venv/bin/python -c "import numpy; import torch; import sentence_transformers; print('✅ Dependencies OK')"

            # Set environment for migration & seeding
            export ENV_STATE=${{ github.ref_name }}

            # Clean up disk space to ensure enough room for model download (~90MB)
            echo "🧹 Cleaning up disk space before seeding..."
            rm -rf ~/.cache/huggingface/hub/models--sentence-transformers--all-MiniLM-L6-v2 2>/dev/null || true
            rm -rf ~/.cache/huggingface/hub 2>/dev/null || true
            rm -rf ~/.cache/pip 2>/dev/null || true
            pm2 flush 2>/dev/null || true
            sudo apt-get clean -y 2>/dev/null || true

            # Use /tmp for HuggingFace cache (more space)
            export HF_HOME=/tmp/hf_cache
            export HF_HUB_CACHE=/tmp/hf_cache/hub
            mkdir -p $HF_HOME $HF_HUB_CACHE

            # Apply database migrations (adds source_url column, changes embedding dim)
            ./venv/bin/alembic upgrade head

            # Restart or start the application via PM2
            pm2 delete $NAME || true
            ENV_STATE=${{ github.ref_name }} pm2 start "./venv/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT" --name $NAME
            
            # Post-deployment validation
            echo "⏳ Initiating application health check on port $PORT..."
            sleep 15
            
            STATUS=$(pm2 jlist | jq -r ".[] | select(.name==\"$NAME\") | .pm2_env.status")
            if [ "$STATUS" != "online" ]; then
                echo "❌ Deployment failed: PM2 process status is '$STATUS'."
                pm2 logs $NAME --lines 50 --no-daemon & sleep 5 && kill $!
                exit 1
            fi

            # Check HTTP endpoint (FastAPI docs)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/docs)
            if [ "$HTTP_CODE" != "200" ]; then
                echo "❌ Deployment failed: API health check returned HTTP $HTTP_CODE (expected 200)."
                pm2 logs $NAME --lines 50 --no-daemon & sleep 5 && kill $!
                exit 1
            fi

            echo "✅ Deployment completed successfully. Application is operating nominally."
            pm2 save
