name: Epsolve Artifact Deployment

on:
  push:
    branches: [ main, dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deployment Package
        run: |
          # Buat tarball di folder temporary di luar project directory
          tar -czf ../deploy_package.tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='venv' \
          --exclude='__pycache__' \
          .
          # Pindahkan kembali ke folder utama agar bisa dibaca oleh step SCP
          mv ../deploy_package.tar.gz .

      - name: Copy package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy_package.tar.gz"
          target: "/tmp"

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Gunakan path absolut untuk menghindari error tilde (~)
            if [ "${{ github.ref_name }}" == "main" ]; then
              APP_DIR="/home/ubuntu/epsolve/prod"
              PORT=8001
              NAME="epsolve-prod"
            else
              APP_DIR="/home/ubuntu/epsolve/dev"
              PORT=8000
              NAME="epsolve-dev"
            fi

            # Pastikan folder ada
            mkdir -p $APP_DIR

            # Ekstrak file
            if [ -f /tmp/deploy_package.tar.gz ]; then
              tar -xzf /tmp/deploy_package.tar.gz -C $APP_DIR
              rm /tmp/deploy_package.tar.gz
              echo "✅ Extraction successful to $APP_DIR"
            else
              echo "❌ Error: Package not found in /tmp"
              exit 1
            fi

            cd $APP_DIR
            
            # Debug: Cek apakah requirements.txt benar-benar mendarat
            ls -la

            # Setup venv jika belum ada
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # Install dependensi (Gunakan path venv langsung agar lebih stabil)
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt

            # Restart menggunakan PM2 dengan ENV_STATE
            # Kita tambahkan 'ENV_STATE' agar root_path di FastAPI kamu aktif
            ENV_STATE=${{ github.ref_name }} pm2 restart $NAME || \
            ENV_STATE=${{ github.ref_name }} pm2 start "./venv/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT" --name $NAME
            
            pm2 save