name: Epsolve Artifact Deployment

on:
  push:
    branches: [ main, dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deployment Package
        run: git archive -o deploy_package.tar.gz HEAD

      - name: Copy package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy_package.tar.gz"
          target: "/tmp"

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "${{ github.ref_name }}" == "main" ]; then
              APP_DIR="/home/ubuntu/epsolve/prod"
              PORT=8001
              NAME="epsolve-prod"
            else
              APP_DIR="/home/ubuntu/epsolve/dev"
              PORT=8000
              NAME="epsolve-dev"
            fi

            mkdir -p $APP_DIR
            rm -rf $APP_DIR/*   # 🔥 penting biar clean
            tar -xzf /tmp/deploy_package.tar.gz -C $APP_DIR
            rm /tmp/deploy_package.tar.gz

            cd $APP_DIR

            # Generate .env file
            cat <<EOF > .env.${{ github.ref_name }}
            PROJECT_NAME="Epsolve"
            SECRET_KEY="${{ secrets.SECRET_KEY }}"
            ENV_STATE=${{ github.ref_name }}
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            BREVO_API_KEY="${{ secrets.BREVO_API_KEY }}"
            BREVO_SENDER_EMAIL="${{ secrets.BREVO_SENDER_EMAIL }}"
            EOF
            
            # Setup venv jika belum ada
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt

            ENV_STATE=${{ github.ref_name }} pm2 restart $NAME || \
            ENV_STATE=${{ github.ref_name }} pm2 start "venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT" --name $NAME
            
            pm2 save